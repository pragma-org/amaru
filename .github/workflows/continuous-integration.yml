name: Continuous Integration

on:
  workflow_dispatch:
    inputs:
      network:
        description: Network to run
        type: choice
        options: [preprod, preview]
        required: false
      run_until_target_epoch:
        description: "Override run-until target epoch (leave empty for fixed epoch)"
        required: false
      timeout:
        description: "Override timeout for snapshot tests"
        required: false
      run_until_trace_level:
        description: "Override AMARU_TRACE for run-until (leave empty for default)"
        required: false
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, converted_to_draft, ready_for_review]
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always
  RUST_NIGHTLY_TOOLCHAIN: nightly-2026-04-17
  RUSTUP_LOG: error

permissions:
  contents: read
  actions: write

jobs:
  build-linux-x86_64:
    name: Build/Test x86_64/linux
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: ubuntu-24.04
      target: x86_64-unknown-linux-gnu
      cache-mode: ${{ github.ref == 'refs/heads/main' && 'WRITE' || 'READ' }}

  build-linux-aarch64:
    name: Build/Test aarch64/linux
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: ubuntu-24.04-arm
      target: aarch64-unknown-linux-gnu
      cache-mode: ${{ github.ref == 'refs/heads/main' && 'WRITE' || 'READ' }}

  build-macos-aarch64:
    name: Build/Test aarch64/macos
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: macos-15
      target: aarch64-apple-darwin
      cache-mode: ${{ github.ref == 'refs/heads/main' && 'WRITE' || 'READ' }}

  build-windows-x86_64:
    name: Build/Test x86_64/windows
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: windows-2025
      target: x86_64-pc-windows-msvc
      command: test --tests --workspace --profile dev-debug
      cache-mode: ${{ github.ref == 'refs/heads/main' && 'WRITE' || 'READ' }}

  build-wasm32:
    name: Build wasm32
    needs: [build-linux-x86_64]
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: ubuntu-24.04
      target: wasm32-unknown-unknown
      command: build -p amaru-consensus -p amaru-ledger -p pure-stage
      cache-mode: READ
      setup: rustup target add wasm32-unknown-unknown

  build-riscv:
    name: Build riscv
    needs: [build-linux-x86_64]
    uses: ./.github/workflows/template-cargo-test.yml
    with:
      runner: ubuntu-24.04
      target: riscv32gc-unknown-linux-gnu
      command: +$RUST_NIGHTLY_TOOLCHAIN -Zbuild-std=std,panic_abort build -p amaru-ledger
      cache-mode: READ
      setup: |
        # When targetting RISC-V, the uplc-turbo crate fails to compile.
        # Providing the specific RISC-V gnu clang compiler to Rust allows it to build
        rustup component add rust-src --toolchain "$RUST_NIGHTLY_TOOLCHAIN"
        curl -L -o riscv32-glibc-llvm.tar.xz \
          "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.11.04/riscv32-glibc-ubuntu-24.04-llvm.tar.xz"
        tar -xvf riscv32-glibc-llvm.tar.xz
        export CC_riscv32gc_unknown_linux_gnu="$(pwd)/riscv/bin/riscv32-unknown-linux-gnu-clang"

  coverage:
    name: Test coverage
    needs: [build-linux-x86_64]
    runs-on: ubuntu-24.04
    if: ${{ !github.event.pull_request.draft }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: True
      - uses: ./.github/actions/cache
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        shell: bash
        run: make coverage-lconv
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failed-simulation-data
          path: simulation/amaru-sim/test-data
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  snapshots:
    name: Compare ledger epoch snapshots
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/template-ledger-epoch-snapshots.yml
    with:
      use_fixed_epoch: true
      default_timeout: 30
      network: ${{ github.event.inputs.network || '' }}
      run_until_target_epoch: ${{ github.event.inputs.run_until_target_epoch || '' }}
      timeout: ${{ github.event.inputs.timeout || '' }}
      run_until_trace_level: ${{ github.event.inputs.run_until_trace_level || '' }}
      run_tests: ${{ github.event_name == 'pull_request' }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      CARDANO_NODE_BUCKET_NAME: ${{ secrets.CARDANO_NODE_BUCKET_NAME }}

  benches:
    name: Bench
    needs: [build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache
      - name: benches headers_tree
        shell: bash
        run: cargo bench --bench headers_tree --features="test-utils profiling"

  cli:
    name: Test Command-line
    needs: [build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache
      - name: Install bash_unit
        shell: bash
        run: curl -s https://raw.githubusercontent.com/bash-unit/bash_unit/master/install.sh | bash
      - name: Install expect
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y expect
      - name: Run bash_unit
        shell: bash
        run: FORCE_COLOR=true ./bash_unit cli-tests/test_*

  trace-schemas:
    name: Test trace schemas & documentation
    needs: [build-linux-x86_64]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/cache
      - name: Validate trace schemas
        run: make validate-trace-schemas
      - name: Upload schema diff
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: schema-diff
          path: /tmp/schemas.diff
      - name: Generate current TRACES.md
        run: |
          ./scripts/generate-traces-doc
          cp docs/TRACES.md /tmp/TRACES-current.md
          git checkout docs/TRACES.md
      - name: Compare TRACES.md
        run: |
          if diff -u docs/TRACES.md /tmp/TRACES-current.md > /tmp/traces.diff; then
            echo "✓ TRACES.md is up-to-date"
          else
            echo "✗ TRACES.md has changed!"
            echo ""
            echo "--- Expected (docs/TRACES.md)"
            echo "+++ Current (generated)"
            cat /tmp/traces.diff
            exit 1
          fi
      - name: Show update instructions on failure
        if: failure()
        run: |
          echo "Documentation changes detected. Please run:"
          echo ""
          echo "  ./scripts/generate-traces-doc"
          echo ""
          echo "If schemas changed, also run:"
          echo ""
          echo "  cargo run --bin amaru -- dump-traces-schema 2> docs/traces-schema.json"
          echo ""
          echo "Then commit the updated files."
