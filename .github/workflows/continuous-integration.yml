name: Continuous Integration

on:
  workflow_dispatch:
    inputs:
      network:
        description: Network to run
        type: choice
        options: [preprod, preview]
        required: false
      run_until_target_epoch:
        description: "Override run-until target epoch (leave empty for fixed epoch)"
        required: false
      timeout:
        description: "Override timeout for snapshot tests"
        required: false
      run_until_trace_level:
        description: "Override AMARU_TRACE for run-until (leave empty for default)"
        required: false
  push:
    branches: ["main"]
  pull_request:
    types: [opened, synchronize, reopened, converted_to_draft, ready_for_review]
    branches: ["*"]

env:
  CARGO_TERM_COLOR: always
  RUST_CACHE_PATH: |
    ~/.cargo/bin/
    ~/.cargo/registry/index/
    ~/.cargo/registry/cache/
    ~/.cargo/git/db/
    target/
  RUST_NIGHTLY_TOOLCHAIN: nightly-2026-04-17
  RUSTUP_LOG: error

permissions:
  contents: read
  actions: write

jobs:
  build:
    name: Build ${{ matrix.environments.title }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        environments:
          - runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            title: x86_64/linux

          - runner: ubuntu-22.04
            target: aarch64-unknown-linux-musl
            title: aarch64/linux
            command: test # This is a cross specific command. Do not change
            setup: rustup target add aarch64-unknown-linux-musl
            cross-compile: true

          - runner: macos-latest
            target: aarch64-apple-darwin
            title: aarch64/macos

          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            title: x86_64/windows
            command: test --workspace --all-targets --profile dev-debug

          - runner: ubuntu-22.04
            target: wasm32-unknown-unknown
            title: wasm32
            packages: -p amaru-consensus -p amaru-ledger -p pure-stage
            command: build
            setup: rustup target add wasm32-unknown-unknown

          # When targetting RISC-V, the uplc-turbo crate fails to compile.
          # Providing the specific RISC-V gnu clang compiler to Rust allows it to build
          - runner: ubuntu-22.04
            target: riscv32gc-unknown-linux-gnu
            title: riscv32
            packages: -p amaru-ledger
            extra-args: +$RUST_NIGHTLY_TOOLCHAIN -Zbuild-std=std,panic_abort
            command: build
            setup: |
              rustup component add rust-src --toolchain "$RUST_NIGHTLY_TOOLCHAIN"
              curl -L -o riscv32-glibc-llvm.tar.xz \
                "https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.11.04/riscv32-glibc-ubuntu-22.04-llvm.tar.xz"
              tar -xvf riscv32-glibc-llvm.tar.xz
              export CC_riscv32gc_unknown_linux_gnu="$(pwd)/riscv/bin/riscv32-unknown-linux-gnu-clang"
    runs-on: ${{ matrix.environments.runner }}
    steps:
      - name: Support longpaths
        run: git config --system core.longpaths true
        if: contains(matrix.environments.runner, 'windows')
      - uses: actions/checkout@v4
        with:
          submodules: true
      - id: timestamp
        shell: bash
        run: |
          echo "value=$(/bin/date -u '+%Y%m%d-%H%M%S')" >> $GITHUB_OUTPUT
      # Cache dependencies when pushing (i.e. merging into allowed branch).
      - uses: actions/cache@v4
        if: github.event_name == 'push'
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-${{ matrix.environments.target }}-${{ steps.timestamp.outputs.value }}
          restore-keys: |
            cargo-${{ matrix.environments.target }}
      # Only restore cache for other types of events (e.g. Pull requests).
      - uses: actions/cache/restore@v4
        if: github.event_name != 'push'
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-${{ matrix.environments.target }}
          restore-keys: |
            cargo-${{ matrix.environments.target }}
      - name: Run build
        shell: bash
        run: |
          set -e
          EXTRA_ARGS="${{ matrix.environments.extra-args || '' }}"
          SCOPE="${{ matrix.environments.packages || '' }}"
          COMMAND="${{ matrix.environments.command  || 'test --workspace --all-targets' }}"
          if [[ -n "${{ matrix.environments.setup }}" ]]; then
            echo "Running setup command: ${{ matrix.environments.setup }}"
            ${{ matrix.environments.setup }}
          fi
          if [[ "${{ matrix.environments.cross-compile }}" == "true" ]] ; then
            cargo install --force cross --git https://github.com/cross-rs/cross
            # cross doesn't load .cargo/config.toml, see https://github.com/cross-rs/cross/issues/562
            $HOME/.cargo/bin/cross $COMMAND --locked $SCOPE --target ${{ matrix.environments.target }}
          else
            if [[ "${{ matrix.environments.target }}" == "x86_64-unknown-linux-gnu" ]] ; then
              cargo $EXTRA_ARGS $COMMAND $SCOPE --locked
            else
              cargo $EXTRA_ARGS $COMMAND $SCOPE --locked --target ${{ matrix.environments.target }}
            fi
            # Run doc tests separately as --doc can't be used with --all-targets
            cargo test --doc
          fi

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-simulation-data
          path: simulation/amaru-sim/test-data

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-simulation-data
          path: simulation/amaru-sim/test-data

  coverage:
    name: Test coverage
    runs-on: ubuntu-22.04
    if: ${{ !github.event.pull_request.draft }}
    env:
      CARGO_TERM_COLOR: always
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: True
      - uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-x86_64-unknown-linux-gnu
          restore-keys: |
            cargo-x86_64-unknown-linux-gnu
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate code coverage
        shell: bash
        run: make coverage-lconv
      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failed-simulation-data
          path: simulation/amaru-sim/test-data
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  snapshots:
    name: End-to-end snapshot tests
    if: ${{ !github.event.pull_request.draft }}
    uses: ./.github/workflows/snapshot-tests.yml
    with:
      use_fixed_epoch: true
      default_timeout: 15
      network: ${{ github.event.inputs.network || '' }}
      run_until_target_epoch: ${{ github.event.inputs.run_until_target_epoch || '' }}
      timeout: ${{ github.event.inputs.timeout || '' }}
      run_until_trace_level: ${{ github.event.inputs.run_until_trace_level || '' }}
      use_buildjet_runner: ${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}
      run_tests: ${{ github.event_name == 'pull_request' }}
    secrets:
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
      CARDANO_NODE_BUCKET_NAME: ${{ secrets.CARDANO_NODE_BUCKET_NAME }}

  examples:
    name: Examples
    strategy:
      fail-fast: false
      matrix:
        projects:
          - ledger-in-nodejs
    defaults:
      run:
        working-directory: examples/${{ matrix.projects }}
    timeout-minutes: 30
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-wasm32-unknown-unknown
          restore-keys: |
            cargo-wasm32-unknown-unknown
      - name: Run make
        shell: bash
        run: make

  benches:
    name: Benches
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-x86_64-unknown-linux-gnu
          restore-keys: |
            cargo-x86_64-unknown-linux-gnu
      - name: Run amaru-consensus benches
        shell: bash
        run: cargo bench --bench headers_tree --features="test-utils profiling"

  cli:
    name: Test the CLI
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-x86_64-unknown-linux-gnu
          restore-keys: |
            cargo-x86_64-unknown-linux-gnu
      - name: Install bash_unit
        shell: bash
        run: curl -s https://raw.githubusercontent.com/bash-unit/bash_unit/master/install.sh | bash
      - name: Install expect
        shell: bash
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y expect
      - name: Run bash_unit
        shell: bash
        run: FORCE_COLOR=true ./bash_unit cli-tests/test_*

  validate-schemas:
    name: Validate Trace Schemas and Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache/restore@v4
        with:
          path: ${{ env.RUST_CACHE_PATH }}
          key: cargo-x86_64-unknown-linux-gnu
          restore-keys: |
            cargo-x86_64-unknown-linux-gnu
      - name: Validate trace schemas
        run: make validate-trace-schemas
      - name: Upload schema diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: schema-diff
          path: /tmp/schemas.diff
      - name: Build amaru release binary
        run: cargo build --bin amaru --release --quiet
      - name: Generate current TRACES.md
        run: |
          ./scripts/generate-traces-doc
          cp docs/TRACES.md /tmp/TRACES-current.md
          git checkout docs/TRACES.md
      - name: Compare TRACES.md
        run: |
          if diff -u docs/TRACES.md /tmp/TRACES-current.md > /tmp/traces.diff; then
            echo "✓ TRACES.md is up-to-date"
          else
            echo "✗ TRACES.md has changed!"
            echo ""
            echo "--- Expected (docs/TRACES.md)"
            echo "+++ Current (generated)"
            cat /tmp/traces.diff
            exit 1
          fi
      - name: Show update instructions on failure
        if: failure()
        run: |
          echo "Documentation changes detected. Please run:"
          echo ""
          echo "  ./scripts/generate-traces-doc"
          echo ""
          echo "If schemas changed, also run:"
          echo ""
          echo "  cargo run --bin amaru -- dump-traces-schema 2> docs/traces-schema.json"
          echo ""
          echo "Then commit the updated files."
